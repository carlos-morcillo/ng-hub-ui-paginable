<nav class="hub-paginator-container" [attr.aria-label]="'PAGINATION' | translate | ucfirst">
	<ul class="hub-paginator">
		<li class="hub-paginator__item" [class.hub-paginator__item--disabled]="isFirstControlDisabled()">
			<a
				role="button"
				class="hub-paginator__link"
				href="javascript:{}"
				[attr.aria-label]="'FIRST' | translate | ucfirst"
				(click)="page.set(getFirstControlTarget())"
			>
				<i class="hub-paginator__icon hub-paginator__icon--angle-double-left"></i>
			</a>
		</li>
		<li class="hub-paginator__item" [class.hub-paginator__item--disabled]="isPreviousControlDisabled()">
			<a
				role="button"
				class="hub-paginator__link"
				href="javascript:{}"
				[attr.aria-label]="'PREVIOUS' | translate | ucfirst"
				(click)="page.set(getPreviousControlTarget())"
			>
				<span class="hub-paginator__icon-wrapper" aria-hidden="true">
					<i class="hub-paginator__icon hub-paginator__icon--angle-left"></i>
				</span>
			</a>
		</li>
		@if (page() - 1 > 1) {
			<li class="hub-paginator__item hub-paginator__item--disabled">
				<a role="button" class="hub-paginator__link" href="javascript:{}">...</a>
			</li>
		}
		@if (page() - 1 >= 1) {
			<li class="hub-paginator__item">
				<a role="button" class="hub-paginator__link" href="javascript:{}" (click)="page.set(page() - 1)">{{
					page() - 1
				}}</a>
			</li>
		}
		<li class="hub-paginator__item hub-paginator__item--active">
			<a role="button" class="hub-paginator__link" href="javascript:{}">{{ page() }}</a>
		</li>
		@if (numberOfPages()) {
			@if (page() + 1 <= numberOfPages()!) {
				<li class="hub-paginator__item">
					<a role="button" class="hub-paginator__link" href="javascript:{}" (click)="page.set(page() + 1)">{{
						page() + 1
					}}</a>
				</li>
			}
			@if (page() + 1 < numberOfPages()!) {
				<li class="hub-paginator__item hub-paginator__item--disabled">
					<a role="button" class="hub-paginator__link" href="javascript:{}">...</a>
				</li>
			}
			<li class="hub-paginator__item" [class.hub-paginator__item--disabled]="isNextControlDisabled()">
				<a
					role="button"
					class="hub-paginator__link"
					href="javascript:{}"
					[attr.aria-label]="'NEXT' | translate | ucfirst"
					(click)="page.set(getNextControlTarget())"
				>
					<span class="hub-paginator__icon-wrapper" aria-hidden="true">
						<i class="hub-paginator__icon hub-paginator__icon--angle-right"></i>
					</span>
				</a>
			</li>
			<li class="hub-paginator__item" [class.hub-paginator__item--disabled]="isLastControlDisabled()">
				<a
					role="button"
					class="hub-paginator__link"
					href="javascript:{}"
					[attr.aria-label]="'LAST' | translate | ucfirst"
					(click)="page.set(getLastControlTarget())"
				>
					<i class="hub-paginator__icon hub-paginator__icon--angle-double-right"></i>
				</a>
			</li>
		} @else {
			<li class="hub-paginator__item">
				<a
					role="button"
					class="hub-paginator__link"
					href="javascript:{}"
					[attr.aria-label]="'NEXT' | translate | ucfirst"
					(click)="page.set(getNextControlTarget())"
				>
					<span class="hub-paginator__icon-wrapper" aria-hidden="true">
						<i class="hub-paginator__icon hub-paginator__icon--angle-right"></i>
					</span>
				</a>
			</li>
		}
	</ul>
</nav>
